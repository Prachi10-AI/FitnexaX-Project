<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Login – FitnexaX</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="auth-body">
  <div class="bg-orbs"><span></span><span></span><span></span></div>

  <div class="auth-card glass-card">
    <a href="index.html" class="logo auth-logo">Fitnexa<span class="logo-x">X</span></a>
    <h2>Welcome back 👋</h2>
    <p class="auth-sub">Log in to continue your health journey.</p>
    <form id="loginForm">
      <div class="form-group">
        <label for="loginEmail">Email</label>
        <input type="email" id="loginEmail" placeholder="you@example.com" required autocomplete="email" />
      </div>
      <div class="form-group">
        <label for="loginPassword">Password</label>
        <input type="password" id="loginPassword" placeholder="••••••••" required autocomplete="current-password" />
      </div>
      <button type="submit" class="btn-primary full-width">Login</button>
      <p id="loginError" class="form-error"></p>
      <p class="form-note">No account? <a href="signup.html">Sign up free</a></p>
    </form>
  </div>

  <script src="js/storage.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
